    <style>
      @keyframes bounce-up {
        0%,
        100% {
          transform: translateY(0);
        }

        50% {
          transform: translateY(-8px);
        }
      }

      .animate-bounce-up {
        animation: bounce-up 2s infinite ease-in-out;
      }

      html,
      body {
        height: 100%;
        margin: 0;
        overflow: hidden;
      }

      .top-nav {
        position: absolute;
        top: 14px;
        left: 0;
        right: 0;
        z-index: 30;
        display: grid;
        grid-template-columns: 48px 1fr 48px;
        align-items: center;
        padding: 0 12px;
        pointer-events: none;
      }

      .top-action {
        display: grid;
        width: 36px;
        height: 36px;
        place-items: center;
        border: 0;
        border-radius: 9999px;
        background: rgba(255, 255, 255, 0.78);
        color: #0c2a1c;
        pointer-events: auto;
        backdrop-filter: blur(8px);
      }

      .top-action.is-hidden {
        opacity: 0;
        pointer-events: none;
      }

      .top-action .material-symbols-outlined {
        font-size: 22px;
        font-variation-settings:
          'FILL' 0,
          'wght' 500,
          'GRAD' 0,
          'opsz' 24;
      }

      .top-title {
        justify-self: center;
        color: #ffffff;
        font-size: 14px;
        font-weight: 500;
        letter-spacing: 0.18em;
        text-transform: uppercase;
      }

      .center-kev-box {
        position: absolute;
        top: 45%;
        left: 50%;
        z-index: 5;
        display: grid;
        width: 96px;
        height: 96px;
        place-items: center;
        transform: translate(-50%, -50%);
        border-radius: 0;
        border: 3px solid rgba(255, 255, 255, 0.95);
        background: transparent;
      }

      .center-kev-box span {
        color: #ffffff;
        font-size: 18px;
        font-weight: 300;
        letter-spacing: 0.08em;
      }

      #swipe-area {
        isolation: isolate;
        overflow: visible;
      }

      #swipe-area::before {
        content: '';
        position: absolute;
        top: -18px;
        left: 50%;
        width: max(130vw, 520px);
        height: max(130vw, 520px);
        transform: translateX(-50%) rotate(var(--arch-turn, 0deg));
        border-radius: 9999px;
        background: #ffffff;
        box-shadow: 0 -12px 40px rgba(0, 0, 0, 0.06);
        transition: transform 620ms cubic-bezier(0.22, 1, 0.36, 1);
        will-change: transform;
        z-index: 0;
      }

      #swipe-area > :not(.stepper-arc) {
        position: relative;
        z-index: 1;
      }

      .stepper-arc {
        position: absolute;
        top: -18px;
        left: 50%;
        width: 116px;
        height: 44px;
        transform: translateX(-50%);
        z-index: 2;
        pointer-events: none;
        overflow: visible;
      }

      .stepper-arc .step-track,
      .stepper-arc .step-fill {
        fill: none;
        stroke-linecap: round;
        stroke-width: 6;
      }

      .stepper-arc .step-track {
        stroke: rgba(0, 168, 89, 0.18);
      }

      .stepper-arc .step-fill {
        stroke: #00a859;
        transition: stroke-dashoffset 620ms cubic-bezier(0.22, 1, 0.36, 1);
      }

      .step-stage {
        width: min(100%, 360px);
        height: 128px;
        position: relative;
        overflow: visible;
        --clock-origin-y: 230px;
      }

      .step-panel {
        position: absolute;
        inset: 0;
        opacity: 0;
        pointer-events: none;
        transform: rotate(-22deg);
        transform-origin: 50% var(--clock-origin-y);
      }

      .step-panel.is-active {
        opacity: 1;
        pointer-events: auto;
        transform: rotate(0deg);
      }

      .step-panel.is-leaving-next {
        animation: clock-leave 620ms cubic-bezier(0.22, 1, 0.36, 1) forwards;
        pointer-events: none;
      }

      .step-panel.is-entering-next {
        animation: clock-enter 620ms cubic-bezier(0.22, 1, 0.36, 1) forwards;
        pointer-events: auto;
      }

      .step-panel.is-leaving-prev {
        animation: clock-leave-prev 620ms cubic-bezier(0.22, 1, 0.36, 1) forwards;
        pointer-events: none;
      }

      .step-panel.is-entering-prev {
        animation: clock-enter-prev 620ms cubic-bezier(0.22, 1, 0.36, 1) forwards;
        pointer-events: auto;
      }

      @keyframes clock-leave {
        from {
          opacity: 1;
          transform: rotate(0deg);
        }

        to {
          opacity: 0;
          transform: rotate(26deg);
        }
      }

      @keyframes clock-enter {
        from {
          opacity: 0;
          transform: rotate(-26deg);
        }

        to {
          opacity: 1;
          transform: rotate(0deg);
        }
      }

      @keyframes clock-leave-prev {
        from {
          opacity: 1;
          transform: rotate(0deg);
        }

        to {
          opacity: 0;
          transform: rotate(-26deg);
        }
      }

      @keyframes clock-enter-prev {
        from {
          opacity: 0;
          transform: rotate(26deg);
        }

        to {
          opacity: 1;
          transform: rotate(0deg);
        }
      }

      .room-form {
        width: 100%;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .skip-session {
        align-self: center;
        border: 0;
        background: transparent;
        color: #008f4d;
        font-size: 11px;
        font-weight: 500;
        line-height: 1;

      .form-row {
        display: flex;
        align-items: flex-end;
        gap: 10px;
      }

      .form-field {
        display: flex;
        min-width: 0;
        flex-direction: column;
        gap: 0;

        font-size: 11px;
        font-weight: 600;

      .building-field {
        flex: 1 1 auto;
      }

      .floor-field {

      }

      .room-field {
        flex: 1 1 auto;

      .clearable-field,

        position: relative;

      .clearable-field {
        display: block;
      }

      .input-shell {
        display: block;
        min-width: 0;
        flex: 1 1 0;

      .text-input,

        height: 42px;

        border: 1px solid #edf1f5;
        border-radius: 9999px !important;
        background: #ffffff;
        color: #10231d;
        font-size: 12px;
        outline: none;
      }

      .text-input {
        display: block;
        appearance: none;
        padding: 0 16px;
      }

      .clearable-field .text-input,
      .input-shell .box-input {
        padding-right: 34px;
      }

      .clear-input {
        position: absolute;
        top: 50%;
        right: 10px;
        display: none;
        width: 20px;
        height: 20px;
        place-items: center;
        transform: translateY(-50%);
        border: 0;
        border-radius: 9999px;
        background: transparent;
        color: #98a2b3;
        font-family: 'Material Symbols Outlined';
        font-size: 17px;
        font-variation-settings:
          'FILL' 0,
          'wght' 500,
          'GRAD' 0,
          'opsz' 20;
        line-height: 1;
      }

      .clearable-field.has-value .clear-input,
      .input-shell.has-value .clear-input {
        display: grid;
      }

      .text-input::placeholder {
        color: #667085;
      }

      .floor-control {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 6px;
        gap: 3px;
        font-size: 10px;
        font-weight: 500;
        white-space: nowrap;
      }

      .floor-button {
        display: grid;
        width: 22px;
        height: 22px;
        flex: 0 0 22px;
        place-items: center;
        border-radius: 9999px;
        background: #f3f6f8;
        color: #667085;
        line-height: 1;
      }

      #floor-label {
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .arrow-button {
        display: grid;
        width: 42px;
        height: 42px;
        flex: 0 0 42px;
        place-items: center;
        border-radius: 9999px;
        background: #00a859;
        color: #ffffff;
        font-size: 22px;
        font-weight: 700;
        line-height: 1;
        box-shadow: 0 4px 12px rgba(0, 176, 80, 0.25);
        transition:
          transform 150ms ease,
          box-shadow 150ms ease;
      }

      .arrow-button:active {
        transform: scale(0.96);
      }

      .arrow-button .material-symbols-outlined {
        font-size: 24px;
        font-variation-settings:
          'FILL' 0,
          'wght' 600,
          'GRAD' 0,
          'opsz' 24;
      }

      .new-step {
        width: 100%;
        height: 94px;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }

      .new-step span:first-child {
        color: #0c2a1c;
        font-size: 24px;
        font-weight: 700;
      }

      .index-step {
        width: 100%;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .range-row,
      .course-row,
      .index-actions {
        display: flex;
        gap: 8px;
        width: 100%;
      }

      .index-actions {
        align-items: flex-start;
      }

      .box-input,
      .box-button {
        height: 36px;
        border-radius: 9999px !important;
        font-size: 12px;
        outline: none;
      }

      .box-input {
        display: block;
        appearance: none;
        width: 100%;
        min-width: 0;
        flex: 1 1 0;
        border: 1px solid #d9dee5;
        background: #ffffff;
        color: #10231d;
        padding: 0 12px;

      .box-input::placeholder {
        color: #667085;
      }

      .box-button {
        flex: 0 0 36px;
        border: 0;
        border-radius: 9999px !important;
        background: #eef2f5;
        color: #344054;
        font-size: 22px;
        font-weight: 700;
        line-height: 1;
      }

      .added-courses {
        display: none;
        min-height: 38px;
        flex: 1 1 auto;
        order: 1;
        flex-wrap: nowrap;
        gap: 5px;
        overflow: hidden;
      }

      .course-chip {
        display: flex;
        position: relative;
        height: 38px;
        min-width: 0;
        flex: 1 1 0;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        padding: 0 20px 0 7px;
        border: 1px solid rgba(0, 168, 89, 0.18);
        border-radius: 8px;
        background: rgba(0, 168, 89, 0.08);
        color: #0c2a1c;
        font-size: 9px;
        font-weight: 600;
        line-height: 1.2;
        text-align: center;
        white-space: nowrap;
        overflow: hidden;
      }

      .course-chip span {
        display: block;
        max-width: 100%;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .course-chip .range-line {
        font-size: 9px;
      }

      .course-chip .course-line {
        color: #667085;
        font-size: 8px;
        font-weight: 500;
      }

      .remove-chip {
        position: absolute;
        top: 3px;
        right: 4px;
        display: grid;
        width: 14px;
        height: 14px;
        place-items: center;
        border: 0;
        border-radius: 9999px;
        background: transparent;
        color: #667085;
        font-family: 'Material Symbols Outlined';
        font-size: 12px;
        font-variation-settings:
          'FILL' 0,
          'wght' 600,
          'GRAD' 0,
          'opsz' 20;
        line-height: 1;
      }

      .wide-next {
        display: flex;
        width: 100%;
        height: 38px;
        flex: 1 1 auto;
        order: 2;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        padding: 0 6px 0 16px;
        border: 1px solid rgba(0, 168, 89, 0.16);
        border-radius: 9999px;
        background: #eaf8f0;
        color: #008f4d;
        font-size: 14px;
        font-weight: 700;
        box-shadow: 0 5px 14px rgba(0, 0, 0, 0.06);
        transition:
          width 220ms ease,
          flex-basis 220ms ease,
          padding 220ms ease,
          transform 150ms ease;
      }

      .wide-next span:first-child {
        font-size: 14px;
        line-height: 1;
      }

      .wide-next .material-symbols-outlined {
        display: grid;
        width: 28px;
        height: 28px;
        place-items: center;
        border-radius: 9999px;
        background: #00a859;
        color: #ffffff;
        font-size: 21px;
        font-variation-settings:
          'FILL' 0,
          'wght' 600,
          'GRAD' 0,
          'opsz' 24;
      }

      .wide-next:active {
        transform: scale(0.98);
      }

      .index-step.has-items .wide-next {
        width: 38px;
        flex: 0 0 38px;
        margin-left: auto;
        justify-content: center;
        padding: 0;
        border-color: transparent;
        background: transparent;
        box-shadow: none;
      }

      .index-step.has-items .wide-next span:first-child {
        display: none;
      }

      .index-step.has-items .added-courses {
        display: flex;
      }

      .session-step {
        width: 100%;
        display: flex;
        flex-direction: column;
        gap: 9px;
        padding-top: 10px;
      }

      .session-label {
        color: #001b12;
        font-size: 14px;
        font-weight: 500;
      }
    </style>

              <button
                class="box-button"
                id="add-course"
                type="button"
                aria-label="Add course range"
              >
                +
              </button>
            </div>
            <div class="index-actions">
              <button class="wide-next" type="button" aria-label="Save and continue">
                <span>Save and continue</span>
                <span class="material-symbols-outlined">chevron_right</span>
              </button>
              <div class="added-courses" id="added-courses" aria-live="polite"></div>
            </div>
          </div>
        </div>

        <div class="step-panel" data-step-panel="2">
          <div class="session-step">
            <label class="clearable-field">
              <input
                class="text-input"
                id="session-code"
                type="text"
                inputmode="numeric"
                placeholder="Active Session Code"
              />
              <button class="clear-input" type="button" aria-label="Clear Active Session Code">
                close
              </button>
            </label>
            <button class="wide-next" type="button" aria-label="Save and continue">
              <span>Save and continue</span>
              <span class="material-symbols-outlined">chevron_right</span>
            </button>
          </div>
        </div>
      </div>
    </div>

    <script>
      const swipeArea = document.getElementById('swipe-area');
      const topLeftAction = document.getElementById('top-left-action');
      const topRightAction = document.getElementById('top-right-action');
      const stepperSvg = swipeArea.querySelector('.stepper-arc');
      const stepStage = swipeArea.querySelector('.step-stage');
      const stepPanels = Array.from(swipeArea.querySelectorAll('.step-panel'));
      const stepTrack = stepperSvg.querySelector('.step-track');
      const stepFill = stepperSvg.querySelector('.step-fill');
      const totalSteps = stepPanels.length;
      let currentStep = 0;
      let isChangingStep = false;

      const arcY = (x, radius, offset) => {
        const dx = x - 58;
        return radius - Math.sqrt(Math.max(0, radius * radius - dx * dx)) + offset;
      };

      const curvedStepPath = (startX, endX, radius, offset) => {
        const midX = (startX + endX) / 2;
        const startY = arcY(startX, radius, offset);
        const midY = arcY(midX, radius, offset);
        const endY = arcY(endX, radius, offset);
        const controlY = 2 * midY - (startY + endY) / 2;

        return `M${startX} ${startY.toFixed(2)} Q${midX} ${controlY.toFixed(2)} ${endX} ${endY.toFixed(2)}`;
      };

      const renderStepper = (archRadius, stepperOffset) => {
        stepperSvg.setAttribute(
          'aria-label',
          currentStep === 2 ? 'Session code' : `Step ${currentStep + 1} of 2`,
        );
        const trackPath = curvedStepPath(8, 108, archRadius, stepperOffset);

        stepTrack.setAttribute('d', trackPath);
        stepFill.setAttribute('d', trackPath);

        const pathLength = stepFill.getTotalLength();
        const progress = currentStep === 2 ? 1 : (currentStep + 1) / 2;
        stepFill.style.strokeDasharray = pathLength;
        stepFill.style.strokeDashoffset = pathLength * (1 - progress);
      };

      const renderTopNav = () => {
        const isFirstStep = currentStep === 0;
        const leftIcon = topLeftAction.querySelector('.material-symbols-outlined');

        leftIcon.textContent = isFirstStep ? 'close' : 'arrow_back';
        topLeftAction.setAttribute('aria-label', isFirstStep ? 'Close' : 'Back');
        topRightAction.classList.toggle('is-hidden', isFirstStep);
      };

      const updateStepperArc = () => {
        const archStyle = getComputedStyle(swipeArea, '::before');
        const archTop = parseFloat(archStyle.top);
        const archRadius = parseFloat(archStyle.width) / 2;
        const stepperOffset = 22;

        stepperSvg.style.top = `${archTop}px`;
        stepStage.style.setProperty(
          '--clock-origin-y',
          `${archTop + archRadius - stepStage.offsetTop}px`,
        );
        swipeArea.style.setProperty('--arch-turn', `${currentStep * 36}deg`);
        renderStepper(archRadius, stepperOffset);
        renderTopNav();
      };

      updateStepperArc();
      window.addEventListener('resize', updateStepperArc);

      const goToStep = (nextStep, direction = 'next') => {
        if (isChangingStep) return;

        const outgoingPanel = stepPanels[currentStep];
        const incomingPanel = stepPanels[nextStep];
        const leaveClass = direction === 'prev' ? 'is-leaving-prev' : 'is-leaving-next';
        const enterClass = direction === 'prev' ? 'is-entering-prev' : 'is-entering-next';

        isChangingStep = true;
        outgoingPanel.classList.add(leaveClass);
        incomingPanel.classList.add(enterClass);

        currentStep = nextStep;
        updateStepperArc();

        incomingPanel.addEventListener(
          'animationend',
          () => {
            stepPanels.forEach((panel) => {
              panel.classList.remove(
                'is-active',
                'is-leaving-next',
                'is-entering-next',
                'is-leaving-prev',
                'is-entering-prev',
              );
            });
            incomingPanel.classList.add('is-active');
            isChangingStep = false;
          },
          { once: true },
        );
      };

      const handleAction = () => {
        if (currentStep === 1 || currentStep === 2) {
          console.log(
            currentStep === 1 ? 'Save and continue room setup' : 'Save and continue session code',
          );
          return;
        }

        goToStep((currentStep + 1) % totalSteps, 'next');
      };

      const handleClose = () => {
        console.log('Close room setup');
      };

      const goBack = () => {
        if (currentStep === 0) {
          return;
        }

        goToStep(currentStep === 2 ? 0 : currentStep - 1, 'prev');
      };

      topLeftAction.addEventListener('click', () => {
        if (currentStep === 0) {
          handleClose();
          return;
        }

        goBack();
      });

      topRightAction.addEventListener('click', handleClose);

      const floorOptions = [
        'B4',
        'B3',
        'B2',
        'B1',
        'GF',
        '1F',
        '2F',
        '3F',
        '4F',
        '5F',
        '6F',
        '7F',
        '8F',
      ];
      let floorIndex = 4;
      const floorLabel = document.getElementById('floor-label');
      const floorButtons = swipeArea.querySelectorAll('.floor-button');

      const updateFloor = () => {
        floorLabel.textContent = floorOptions[floorIndex];
      };

      floorButtons[0].addEventListener('click', () => {
        floorIndex = Math.max(0, floorIndex - 1);
        updateFloor();
      });

      floorButtons[1].addEventListener('click', () => {
        floorIndex = Math.min(floorOptions.length - 1, floorIndex + 1);
        updateFloor();
      });

      const indexStep = document.getElementById('index-step');
      const indexFrom = document.getElementById('index-from');
      const indexTo = document.getElementById('index-to');
      const indexCourse = document.getElementById('index-course');
      const addCourseBtn = document.getElementById('add-course');
      const addedCourses = document.getElementById('added-courses');

      const updateClearState = (input) => {
        const field = input.closest('.clearable-field, .input-shell');

        if (field) {
          field.classList.toggle('has-value', input.value.length > 0);
        }
      };

      swipeArea.querySelectorAll('.text-input, .box-input').forEach((input) => {
        updateClearState(input);

        input.addEventListener('input', () => updateClearState(input));
      });

      swipeArea.querySelectorAll('.clear-input').forEach((button) => {
        button.addEventListener('click', (e) => {
          const field = button.closest('.clearable-field, .input-shell');
          const input = field.querySelector('input');

          e.preventDefault();
          e.stopPropagation();
          input.value = '';
          updateClearState(input);
          input.focus();
        });
      });

      const addCourseEntry = () => {
        const from = indexFrom.value.trim() || 'From';
        const to = indexTo.value.trim() || 'To';
        const course = indexCourse.value.trim() || 'Course';
        const chip = document.createElement('span');
        const rangeLine = document.createElement('span');
        const courseLine = document.createElement('span');
        const removeButton = document.createElement('button');

        chip.className = 'course-chip';
        rangeLine.className = 'range-line';
        courseLine.className = 'course-line';
        removeButton.className = 'remove-chip';
        removeButton.type = 'button';
        removeButton.setAttribute('aria-label', 'Remove added course');
        rangeLine.textContent = `${from}-${to}`;
        courseLine.textContent = course;
        removeButton.textContent = 'close';
        chip.append(rangeLine, courseLine, removeButton);
        addedCourses.appendChild(chip);
        indexStep.classList.add('has-items');
        indexCourse.value = '';
        updateClearState(indexCourse);
        indexCourse.focus();
      };

      addCourseBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        addCourseEntry();
      });

      addedCourses.addEventListener('click', (e) => {
        const removeButton = e.target.closest('.remove-chip');

        if (!removeButton) return;

        e.preventDefault();
        e.stopPropagation();
        removeButton.closest('.course-chip').remove();
        indexStep.classList.toggle('has-items', addedCourses.children.length > 0);
      });

      swipeArea.addEventListener('click', (e) => {
        const skipButton = e.target.closest('[data-skip-session]');
        const nextButton = e.target.closest('.arrow-button, .wide-next');

        if (skipButton) {
          e.preventDefault();
          e.stopPropagation();
          goToStep(2, 'next');
          return;
        }

        if (nextButton) {
          e.preventDefault();
          e.stopPropagation();
          handleAction();
        }
      });

      let touchStartX = 0;
      let touchStartY = 0;

      swipeArea.addEventListener(
        'touchstart',
        (e) => {
          const touch = e.touches[0];

          touchStartX = touch.clientX;
          touchStartY = touch.clientY;
        },
        { passive: true },
      );

      swipeArea.addEventListener(
        'touchend',
        (e) => {
          const touch = e.changedTouches[0];
          const deltaX = touch.clientX - touchStartX;
          const deltaY = touch.clientY - touchStartY;
          const isHorizontalSwipe =
            Math.abs(deltaX) > 55 && Math.abs(deltaX) > Math.abs(deltaY) * 1.4;

          if (!isHorizontalSwipe || isChangingStep) return;

          if (deltaX < 0 && currentStep < totalSteps - 1) {
            goToStep(currentStep + 1, 'next');
            return;
          }

          if (deltaX > 0) {
            goBack();
          }
        },
        { passive: true },
      );
    </script>
  </body>
</html>
