spring:
  application:
    name: kev-backend
  # Java 21 virtual threads — cheap concurrency for the request/IO path.
  threads:
    virtual:
      enabled: true
  datasource:
    # Neon serverless Postgres — POOLED endpoint, sslmode=require (see .env.example).
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/kev}
    username: ${SPRING_DATASOURCE_USERNAME:kev}
    password: ${SPRING_DATASOURCE_PASSWORD:kev}
    hikari:
      # Keep the pool small — Neon serverless has modest connection limits.
      maximum-pool-size: ${DB_POOL_MAX:5}
      minimum-idle: 1
      connection-timeout: 10000
  jpa:
    hibernate:
      ddl-auto: validate # Flyway owns the schema; Hibernate only validates it.
    open-in-view: false
    properties:
      hibernate.jdbc.time_zone: UTC
  flyway:
    enabled: true
    baseline-on-migrate: true
  data:
    redis:
      # Upstash Redis (TLS). Locally these default to a no-op localhost.
      host: ${UPSTASH_REDIS_HOST:localhost}
      port: ${UPSTASH_REDIS_PORT:6379}
      password: ${UPSTASH_REDIS_PASSWORD:}
      ssl:
        enabled: ${UPSTASH_REDIS_SSL:false}
      timeout: 3s
  cache:
    type: ${CACHE_TYPE:redis}
    redis:
      time-to-live: 10m
      cache-null-values: false

server:
  port: ${SERVER_PORT:8080}
  shutdown: graceful
  error:
    include-message: always
    include-binding-errors: always

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,loggers
  endpoint:
    health:
      show-details: when_authorized
      probes:
        enabled: true
  health:
    redis:
      # Don't gate overall health on Redis unless it's actually configured (prod).
      enabled: ${MANAGEMENT_HEALTH_REDIS:false}

logging:
  file:
    name: logs/kev-backend.log
  logback:
    rollingpolicy:
      max-file-size: 10MB
      max-history: 7
      total-size-cap: 200MB
  level:
    com.kev.backend: DEBUG
    org.springframework.web: INFO
  # Surface the correlation id (set by CorrelationIdFilter) on every log line.
  pattern:
    level: "%5p [%X{correlationId:-}]"

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    use-root-path: true
  api-docs:
    path: /v3/api-docs

# Sentry (error tracing). No-ops when the DSN is empty.
sentry:
  dsn: ${SENTRY_DSN_BACKEND:}
  environment: ${SENTRY_ENV:development}
  traces-sample-rate: 0.2
  send-default-pii: false

# ── Application-specific config (bound to AppProperties) ──
kev:
  auth:
    jwt:
      secret: ${JWT_SECRET:changeme-dev-secret-please-override-min-32-bytes!!}
      issuer: kev-backend
      access-ttl: ${JWT_ACCESS_TTL_MINUTES:15}m
      refresh-ttl: ${JWT_REFRESH_TTL_DAYS:30}d
    google:
      # Comma-separated accepted Google OAuth client IDs (aud claim).
      client-ids: ${GOOGLE_CLIENT_IDS:}
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:8081,http://localhost:19006}
