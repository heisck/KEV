# Maestro E2E smoke flow. Requires a dev build on a device/emulator.
# Run with: npm run e2e   (or: maestro test .maestro)
appId: com.kev.app
---
- launchApp
- assertVisible: 'KEV'
# Splash hands off to the sign-in surface (lecturers sign in; no registration).
- extendedWaitUntil:
    visible: 'Google'
    timeout: 15000
